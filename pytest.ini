[pytest]
# Where pytest looks for test files
testpaths = tests

# asyncio_mode = auto means every async def test_*() function is automatically
# treated as an asyncio test. Without this you'd need @pytest.mark.asyncio
# on every single async test function — tedious and easy to forget.
asyncio_mode = auto

# Only collect files that match test_*.py — avoids accidentally running
# non-test files that happen to live in the tests/ directory.
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers — prevents pytest from warning about unknown marks.
# Usage:
#   pytest           → runs unit + integration (CI default)
#   pytest -m eval   → runs only eval tests (needs real ANTHROPIC_API_KEY)
#   pytest -m "not eval" → explicitly skip eval tests
markers =
    eval: marks tests as LLM eval tests that call the real Anthropic API (excluded from CI)
