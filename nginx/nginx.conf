events { worker_connections 1024; }

http {
  # Hide nginx version from headers and error pages
  server_tokens off;

  # Gzip compression
  gzip on;
  gzip_types text/plain application/json text/html application/javascript;

  # Rate limit — 10 req/sec per IP at the proxy level (before it hits FastAPI)
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

  upstream sentinel_api {
    server api:8000;
    keepalive 32;
  }

  # ── Redirect all HTTP → HTTPS ─────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS server ──────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/sentinel.crt;
    ssl_certificate_key /etc/nginx/certs/sentinel.key;

    # Modern TLS only — no TLS 1.0 or 1.1
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options        DENY                always;
    add_header X-Content-Type-Options nosniff             always;
    add_header X-XSS-Protection       "1; mode=block"     always;
    add_header Referrer-Policy        "no-referrer"       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Health check — bypass rate limit so monitors always get through ──
    location /health {
      proxy_pass         http://sentinel_api;
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
    }

    # ── All other routes ─────────────────────────────────────────────────
    location / {
      # Allow burst of 20 requests, then enforce rate limit
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://sentinel_api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;

      # Investigations can take up to 30s — give 60s headroom
      proxy_read_timeout  60s;
      proxy_send_timeout  60s;
      proxy_connect_timeout 5s;

      # Buffer settings
      proxy_buffering    on;
      proxy_buffer_size  4k;
      proxy_buffers      8 4k;
    }
  }
}
